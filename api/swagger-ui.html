<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Finder API — Swagger UI</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }
    #swagger-ui .topbar {
      background-color: #1a1a2e;
    }
    #swagger-ui .topbar-wrapper .link {
      display: none;
    }
    #swagger-ui .topbar-wrapper::before {
      content: "Movie Finder API";
      color: #ffffff;
      font-size: 1.4rem;
      font-weight: 600;
      padding: 0 1rem;
      line-height: 60px;
    }
    .info-banner {
      background: #f0f4ff;
      border-left: 4px solid #4a6cf7;
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      color: #333;
    }
    .info-banner a {
      color: #4a6cf7;
    }
  </style>
</head>
<body>

  <div class="info-banner">
    <strong>Viewing:</strong> <code>openapi.yaml</code> — OpenAPI 3.1.0.
    For the interactive backend (live try-it-out), run
    <code>docker compose up</code> and open
    <a href="http://localhost:8000/docs" target="_blank">http://localhost:8000/docs</a>.
    &nbsp;|&nbsp;
    <a href="openapi.yaml" target="_blank">Download raw spec</a>
  </div>

  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
  <script>
    window.onload = function () {
      SwaggerUIBundle({
        url: "openapi.yaml",
        dom_id: "#swagger-ui",
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: "StandaloneLayout",
        defaultModelsExpandDepth: 2,
        defaultModelExpandDepth: 2,
        docExpansion: "list",
        tryItOutEnabled: false,
        syntaxHighlight: {
          activate: true,
          theme: "agate"
        }
      });
    };
  </script>

</body>
</html>
